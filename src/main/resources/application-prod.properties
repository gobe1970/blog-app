# ─── PostgreSQL Database ─────────────────────────────────────────────────────
# These values should NEVER be hardcoded — inject via environment variables
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/blogdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ─── Connection Pool (HikariCP — Spring Boot default) ────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ─── H2 Console ───────────────────────────────────────────────────────────────
spring.h2.console.enabled=false

# ─── Thymeleaf ───────────────────────────────────────────────────────────────
spring.thymeleaf.cache=true

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.root=WARN                    # Only warnings and errors in prod
logging.level.com.blog=INFO
logging.level.org.hibernate.SQL=OFF

# ─── Custom Blog Properties ───────────────────────────────────────────────────
blog.upload-dir=${UPLOAD_DIR:/var/app/uploads}