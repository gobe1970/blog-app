# ─── App Identity ────────────────────────────────────────────────────────────
spring.application.name=blog-app

# ─── Active Profile (override on deployment) ─────────────────────────────────
spring.profiles.active=dev

# ─── Thymeleaf ───────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ─── File Upload Limits ───────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# ─── Custom Blog Properties ───────────────────────────────────────────────────
blog.upload-dir=uploads
blog.max-file-size-mb=5
blog.allowed-file-types=jpg,jpeg,png,gif

# ─── Logging (base — refined per profile) ────────────────────────────────────
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n