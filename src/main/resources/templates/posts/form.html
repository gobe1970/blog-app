<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>New Post</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container mt-4" style="max-width: 720px;">

    <h1 class="h3 mb-4">Create New Post</h1>

    <!--
        enctype="multipart/form-data" is REQUIRED for file uploads.
        th:object binds the form to the Post model attribute.
        th:action uses Thymeleaf URL builder for safe URL generation.
    -->
    <form th:action="@{/posts/new}"
          th:object="${post}"
          method="post"
          enctype="multipart/form-data"
          novalidate>

        <!-- ── Title ─────────────────────────────────────────────────── -->
        <div class="mb-3">
            <label for="title" class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
            <input type="text"
                   id="title"
                   th:field="*{title}"
                   th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                   class="form-control"
                   placeholder="Enter post title"/>
            <!-- th:errors renders the @NotBlank / @Size message from the entity -->
            <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}"
                 th:errors="*{title}">Title error</div>
        </div>

        <!-- ── Category ──────────────────────────────────────────────── -->
        <div class="mb-3">
            <label for="categoryId" class="form-label fw-semibold">
                Category <span class="text-danger">*</span>
            </label>
            <select id="categoryId" name="categoryId" class="form-select" required>
                <option value="" disabled selected>-- Select a category --</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}">Category Name</option>
            </select>
        </div>

        <!-- ── Content ───────────────────────────────────────────────── -->
        <div class="mb-3">
            <label for="content" class="form-label fw-semibold">
                Content <span class="text-danger">*</span>
            </label>
            <textarea id="content"
                      th:field="*{content}"
                      th:classappend="${#fields.hasErrors('content')} ? 'is-invalid'"
                      class="form-control"
                      rows="8"
                      placeholder="Write your post content here..."></textarea>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('content')}"
                 th:errors="*{content}">Content error</div>
        </div>

        <!-- ── Image Upload ───────────────────────────────────────────── -->
        <div class="mb-4">
            <label for="image" class="form-label fw-semibold">Cover Image</label>
            <input type="file"
                   id="image"
                   name="image"
                   class="form-control"
                   accept="image/jpeg,image/png,image/gif,image/webp"/>
            <div class="form-text">Optional. JPEG, PNG, GIF or WebP — max 5 MB.</div>
        </div>

        <!-- ── Actions ───────────────────────────────────────────────── -->
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">Publish Post</button>
            <a th:href="@{/posts}" class="btn btn-outline-secondary">Cancel</a>
        </div>

    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
